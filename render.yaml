# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ai-resume-analyzer
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
    plan: free
